<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Model → Primitives</title>
<link rel="stylesheet" href="../css/style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app-root"></div>
<script type="module">
  import { initI18n } from '../js/i18n.js';
  import { renderShell } from '../js/ui-shell.js';
  import { initApp } from '../js/app.js';
  await initI18n(); // load the saved/detected language before first render
  renderShell(document.getElementById('app-root'), { primitives: true });
  initApp({ mode: 'primitives' });
</script>
</body>
</html>
